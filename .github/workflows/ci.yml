name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (web + dev extras, no TensorFlow)
        run: pip install ".[web,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the observatory image
        run: docker build -t gan-observatory:ci .
      - name: Smoke-test the container health endpoint
        run: |
          docker run -d --name obs -p 8000:8000 gan-observatory:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz; then echo "\nhealthy"; exit 0; fi
            sleep 1
          done
          echo "container did not become healthy"; docker logs obs; exit 1
